<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0e14">
  <title>Stage Keys - Simple Keyboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="brand">
        <span class="icon">🎹</span>
        <h1>Stage Keys</h1>
      </div>
      <div class="controls">
        <div class="control-item">
          <label for="volume-control">Volume</label>
          <input type="range" id="volume-control" min="0" max="100" value="70">
          <span id="volume-display">70%</span>
        </div>
        <button id="start-btn" class="start-btn">소리 활성화</button>
      </div>
    </header>

    <main class="keyboard-area">
      <div id="keyboard" class="keyboard"></div>
    </main>

    <footer class="app-footer">
      <p>키보드 입력 연주 가능 (A S D F G H J K L ; ...)</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
